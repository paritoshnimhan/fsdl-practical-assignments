<!DOCTYPE html>
<html>
<head>
    <title>Car Service Booking</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

    <div class="container">
        <div style="text-align: center;">
            <img src="logo.png" alt="Car Service Logo" style="max-width: 150px; margin-bottom: 20px;">
        </div>
        <h1>Book a Car Service Appointment</h1>
        
        <p>Please fill out the form below to book your appointment.</p>
        
        <form id="bookingForm">
            <div class="form-group">
                <label for="customerName">Full Name:</label>
                <input type="text" id="customerName" name="customerName" required>
            </div>
            
            <div class="form-group">
                <label for="carModel">Car Model (e.g., Honda Civic 2018):</label>
                <input type="text" id="carModel" name="carModel" required>
            </div>
            
            <div class="form-group">
                <label for="serviceType">Type of Service:</label>
                <select id="serviceType" name="serviceType" required>
                    <option value="">--Select a Service--</option>
                    <option value="General Servicing">General Servicing</option>
                    <option value="Oil Change">Oil Change</option>
                    <option value="Brake Inspection">Brake Inspection</option>
                    <option value="Engine Diagnostics">Engine Diagnostics</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="preferredDate">Preferred Date:</label>
                <input type="date" id="preferredDate" name="preferredDate" required>
            </div>
            
            <div class="form-group">
                <label for="preferredTime">Preferred Time:</label>
                <input type="time" id="preferredTime" name="preferredTime" required>
            </div>
            
            <button type="submit">Book Appointment</button>
        </form>

        <div id="message" style="display:none; margin-top: 15px; padding: 10px; border: 1px solid green; background-color: #d4edda; color: #155724;"></div>
        <div id="error-message" style="display:none; margin-top: 15px; padding: 10px; border: 1px solid red; background-color: #f8d7da; color: #721c24;"></div>
        
    </div>

    <!-- Section to manage appointments -->
    <div class="container" style="margin-top: 30px;">
        <h2>Manage Your Booking</h2>
        <p>Search by your full name to view or cancel your upcoming appointments.</p>
        
        <form id="searchForm">
            <div class="form-group">
                <input type="text" id="searchName" placeholder="Enter your full name" required>
            </div>
            <button type="submit">Search Booking</button>
        </form>

        <div id="searchMessage" style="display:none; margin-top: 15px; padding: 10px; border: 1px solid green; background-color: #d4edda; color: #155724;"></div>
        <div id="searchError" style="display:none; margin-top: 15px; padding: 10px; border: 1px solid red; background-color: #f8d7da; color: #721c24;"></div>
        
        <ul id="searchResults" style="margin-top: 20px; list-style-type: none; padding-left: 0;">
            <!-- Results will be displayed here -->
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
